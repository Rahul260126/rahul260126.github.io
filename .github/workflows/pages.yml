name: GitHub Pages CI
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: gh-pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Patch
        env:
          AEA959: ${{ secrets.AEA959 }}
          B08270: ${{ secrets.B08270 }}
        run: |
          sudo chown -R "$(id -u):$(id -g)" _site
          python3 -c "
          import sys, pathlib, os
          meta_a = os.environ.get('AEA959', '')
          meta_b = os.environ.get('B08270', '')
          changed = 0
          for page in pathlib.Path('_site').rglob('*.html'):
              try:
                  src = page.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              out = src
              if meta_a:
                  out = out.replace('<!-- 9f63ac3d41d509a7b5091f7244e8ab7a87a184f73234 -->', meta_a)
              if meta_b:
                  out = out.replace('<!-- 5ea58176322c71a988e44c2027b10cf2dbeecfde5032 -->', meta_b)
              if out != src:
                  page.write_text(out, encoding='utf-8')
                  changed += 1
          if changed == 0 and (meta_a or meta_b):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: publish
        uses: actions/deploy-pages@v4
